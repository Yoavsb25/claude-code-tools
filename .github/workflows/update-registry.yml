name: Update Registry

on:
  push:
    branches: [main]
    paths:
      - "tools/*/manifest.json"

jobs:
  update-registry:
    name: Regenerate registry.json
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate registry.json
        run: npx ts-node scripts/generate-registry.ts

      - name: Commit updated registry.json and README.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet registry.json README.md; then
            echo "registry.json and README.md unchanged — nothing to commit"
          else
            git add registry.json README.md
            git commit -m "chore: auto-update registry.json and README.md [skip ci]"
            git push
          fi
